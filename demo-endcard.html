<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ver — Demo End Card</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%AC%A1%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #fafafa;
      --muted: #a3a3a3;
      --hashkey: #00FF88;
      --line: #262626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, system-ui, sans-serif;
      overflow: hidden;
    }
    .stage {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 255, 136, 0.12), transparent 60%),
        var(--bg);
    }
    .mark {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid rgba(0, 255, 136, 0.4);
      background: rgba(0, 255, 136, 0.08);
      display: grid;
      place-items: center;
      font-size: 28px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: Newsreader, Georgia, serif;
      font-weight: 600;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    .tag {
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.25rem);
      margin-bottom: 2.5rem;
      text-align: center;
      max-width: 36rem;
    }
    .cmd {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: var(--hashkey);
      background: #111;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.85rem 1.5rem;
      margin-bottom: 2.75rem;
      box-shadow: 0 0 0 1px rgba(0, 255, 136, 0.08), 0 20px 50px rgba(0,0,0,0.45);
    }
    .cmd span { color: var(--muted); user-select: none; margin-right: 0.5rem; }
    .links {
      display: grid;
      gap: 0.85rem;
      width: min(28rem, 100%);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.9rem;
    }
    .row {
      display: grid;
      grid-template-columns: 5.5rem 1fr;
      gap: 1rem;
      align-items: baseline;
      padding-bottom: 0.85rem;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child { border-bottom: 0; }
    .k { color: var(--hashkey); font-weight: 500; }
    .v { color: var(--fg); word-break: break-all; }
    .foot {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--hashkey);
      margin-right: 0.5rem;
      vertical-align: middle;
      box-shadow: 0 0 10px var(--hashkey);
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="mark" aria-hidden="true">⬡</div>
    <h1>Ver</h1>
    <p class="tag">Deterministic Protocol Intelligence for AI</p>
    <div class="cmd"><span>$</span>npx -y ver-mcp</div>
    <div class="links">
      <div class="row"><span class="k">npm</span><span class="v">npmjs.com/package/ver-mcp</span></div>
      <div class="row"><span class="k">github</span><span class="v">github.com/Nifemi0/Ver</span></div>
      <div class="row"><span class="k">site</span><span class="v">ver-eight.vercel.app</span></div>
    </div>
    <p class="foot"><span class="dot"></span>Built for X Layer</p>
  </main>
</body>
</html>
